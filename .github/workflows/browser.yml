name: Browser Tests

on:
  pull_request:
    branches: [master]

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Vitest Browser Mode mounts CanvasEditor directly and runs the source
      # through Vite in a headless Chromium — no build step or dev server needed.
      - name: Run browser interaction tests
        run: npm run test:browser
